spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: ms-cliente
          uri: ${MS_CLIENTE_URL:http://localhost:8082}
          predicates:
            - Path=/api/clientes/**
          filters:
            - StripPrefix=1

        - id: ms-equipo-equipos
          uri: ${MS_EQUIPO_URL:http://localhost:8083}
          predicates:
            - Path=/api/equipos/**
          filters:
            - StripPrefix=1

        - id: ms-equipo-tipos
          uri: ${MS_EQUIPO_URL:http://localhost:8083}
          predicates:
            - Path=/api/tipos-equipo/**
          filters:
            - StripPrefix=1

        - id: ms-tecnico-tecnicos
          uri: ${MS_TECNICO_URL:http://localhost:8084}
          predicates:
            - Path=/api/tecnicos/**
          filters:
            - StripPrefix=1

        - id: ms-tecnico-especialidades
          uri: ${MS_TECNICO_URL:http://localhost:8084}
          predicates:
            - Path=/api/especialidades/**
          filters:
            - StripPrefix=1

        - id: ms-servicio-servicios
          uri: ${MS_SERVICIO_URL:http://localhost:8085}
          predicates:
            - Path=/api/servicios/**
          filters:
            - StripPrefix=1

        - id: ms-servicio-categorias
          uri: ${MS_SERVICIO_URL:http://localhost:8085}
          predicates:
            - Path=/api/categorias/**
          filters:
            - StripPrefix=1

        - id: ms-repuesto
          uri: ${MS_REPUESTO_URL:http://localhost:8086}
          predicates:
            - Path=/api/repuestos/**
          filters:
            - StripPrefix=1

        - id: ms-proveedor
          uri: ${MS_PROVEEDOR_URL:http://localhost:8087}
          predicates:
            - Path=/api/proveedores/**
          filters:
            - StripPrefix=1

        - id: ms-orden
          uri: ${MS_ORDEN_URL:http://localhost:8088}
          predicates:
            - Path=/api/ordenes/**
          filters:
            - StripPrefix=1

        - id: ms-factura
          uri: ${MS_FACTURA_URL:http://localhost:8089}
          predicates:
            - Path=/api/facturas/**
          filters:
            - StripPrefix=1

        - id: ms-agenda
          uri: ${MS_AGENDA_URL:http://localhost:8091}
          predicates:
            - Path=/api/citas/**
          filters:
            - StripPrefix=1

        # El login/registro pasa por el bff (fachada de autenticación), no directo a ms-auth.
        - id: bff-auth
          uri: ${BFF_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=2

      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,gateway

logging:
  level:
    com.duocuc.apigateway: INFO
    org.springframework.cloud.gateway: INFO
