spring:
  application:
    name: ms-agenda
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agendadb}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8091

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

clients:
  ms-cliente:
    base-url: ${MS_CLIENTE_URL:http://localhost:8082}
  ms-tecnico:
    base-url: ${MS_TECNICO_URL:http://localhost:8084}

logging:
  level:
    com.duocuc.msagenda: INFO
